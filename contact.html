<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Derrick Chilenga</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    /* NAVBAR */
    .header {
      backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, 0.7);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 15px 0;
      position: fixed;
      width: 100%;
      z-index: 1000;
    }
    .header h1 {
      color: #38bdf8;
      font-size: 20px;
      margin: 0;
    }
    .nav-links {
      display: flex;
      gap: 15px;
    }
    .nav-links a {
      color: #e2e8f0;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }
    .nav-links a:hover {
      color: #38bdf8;
    }

    /* HERO */
    #hero {
      height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('assets/img/contact-bg.jpg') center/cover no-repeat;
      margin-top: 70px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #hero h1 {
      font-size: 3rem;
      color: #38bdf8;
    }

    /* Contact Cards */
    .contact-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin: 50px 0;
    }
    .contact-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 250px;
      transition: 0.3s;
    }
    .contact-card:hover {
      border-color: #38bdf8;
      transform: translateY(-5px);
    }
    .contact-card i {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 10px;
    }
    .contact-card p {
      margin: 5px 0 0 0;
      word-wrap: break-word;
    }

    /* Contact Form */
    .contact-form {
      max-width: 600px;
      margin: 0 auto 60px auto;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #e2e8f0;
    }
    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: #cbd5e1;
    }
    .contact-form button {
      padding: 12px 25px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .contact-form button:hover {
      background: linear-gradient(135deg, #6366f1, #38bdf8);
    }

    /* Footer */
    .footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      text-align: center;
    }

    /* Responsive */
    @media(max-width:768px) {
      .contact-cards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>
  <!-- NAV -->
  <header class="header">
    <div class="container d-flex justify-content-between align-items-center">
      <h1>Derrick Chilenga</h1>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="resume.html">Resume</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section id="hero">
    <h1>Contact Me</h1>
  </section>

  <!-- CONTACT CARDS -->
  <section>
    <div class="container contact-cards" data-aos="fade-up">
      <div class="contact-card">
        <i class="bi bi-envelope"></i>
        <h5>Email</h5>
        <p>derrickchilenga1@gmail.com</p>
      </div>
      <div class="contact-card">
        <i class="bi bi-telephone"></i>
        <h5>Call</h5>
        <p>+260 963 768 567</p>
      </div>
      <div class="contact-card">
        <i class="bi bi-whatsapp"></i>
        <h5>WhatsApp</h5>
        <p>+260 963 768 567</p>
      </div>
    </div>
  </section>

  <!-- CONTACT FORM -->
  <section>
    <div class="container">
      <form class="contact-form" data-aos="fade-up">
        <h2 class="text-center mb-4">Send a Message</h2>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea rows="6" placeholder="Your Message" required></textarea>
        <div class="text-center">
          <button type="submit">Send Message</button>
        </div>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>&copy; 2025 Derrick Chilenga</p>
  </footer>

  <!-- JS -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000 });
  </script>
</body>
</html>
