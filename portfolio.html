<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - Derrick Chilenga</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Glightbox -->
  <link href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="header fixed-top">
  <div class="container d-flex justify-content-between">
    <h1>Derrick Chilenga</h1>
    <nav>
      <ul class="d-flex gap-3 list-unstyled">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="portfolio.html" class="active">Portfolio</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- MAIN -->
<main class="pt-5 mt-5">
  <section class="portfolio-section py-5">
    <div class="container" data-aos="fade-up">
      <div class="text-center mb-5">
        <h2>Portfolio</h2>
        <p>Some of my key projects and research work</p>
      </div>

      <div class="row g-4" id="portfolio-container">
        <!-- Projects will be injected here -->
      </div>
    </div>
  </section>
</main>

<!-- FOOTER -->
<footer class="footer text-center py-3">
  <p>&copy; 2025 Derrick Chilenga | All Rights Reserved</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>
AOS.init({ duration: 1000 });

// Portfolio projects array
const projects = [
  {
    title: "Brain Tumor Detection",
    description: "Deep Learning & Tensor Methods",
    image: "assets/img/project1.jpg",
    detailImage: "assets/img/tensor.jpg",
    link: "portfolio-details.html#brain-tumor"
  },
  {
    title: "Bank Customer Churn",
    description: "Predictive Modeling",
    image: "assets/img/project2.jpg",
    detailImage: "assets/img/churn.jpg",
    link: "portfolio-details.html#bank-churn"
  },
  {
    title: "Geophysical Inversion",
    description: "Gaussian Processes Research",
    image: "assets/img/project3.jpg",
    detailImage: "assets/img/geophysical.png",
    link: "portfolio-details.html#geophysical"
  }
];

// Inject projects into the container
const container = document.getElementById('portfolio-container');
projects.forEach(project => {
  container.innerHTML += `
    <div class="col-lg-4 col-md-6 portfolio-item" data-aos="fade-up">
      <div class="portfolio-wrap">
        <img src="${project.image}" class="img-fluid" alt="${project.title}">
        <div class="portfolio-info text-center mt-2">
          <h4>${project.title}</h4>
          <p>${project.description}</p>
          <a href="${project.detailImage}" class="glightbox" title="${project.title}"><i class="bi bi-plus"></i></a>
          <a href="${project.link}" class="btn btn-sm btn-primary mt-2">View Details</a>
        </div>
      </div>
    </div>
  `;
});

// Initialize Glightbox
const lightbox = GLightbox({
  selector: '.glightbox'
});
</script>

</body>
</html>
