<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Derrick Chilenga</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    /* Header */
    #header {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      padding: 15px 0;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 999;
    }

    #header h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .navmenu a {
      color: #ccc;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    .navmenu a:hover,
    .navmenu .active {
      color: #00d4ff;
    }

    /* Section */
    section {
      padding: 100px 0;
    }

    .section-title h2 {
      font-size: 40px;
      font-weight: 700;
    }

    .section-title p {
      color: #aaa;
    }

    /* Buttons */
    .filter-btn {
      margin: 5px;
    }

    /* Cards */
    .project-card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.4s;
    }

    .project-card:hover {
      transform: translateY(-10px) scale(1.02);
    }

    .project-card img {
      height: 220px;
      object-fit: cover;
    }

    .project-card h5 {
      font-weight: 600;
    }

    .btn-info {
      background: #00d4ff;
      border: none;
    }

    .btn-info:hover {
      background: #00aacc;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header id="header">
    <div class="container d-flex justify-content-between align-items-center">
      <h1>Derrick Chilenga</h1>
      <nav class="navmenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="resume.html">Resume</a>
        <a href="portfolio.html" class="active">Portfolio</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Portfolio Section -->
  <section>
    <div class="container">

      <div class="section-title text-center mb-5">
        <h2>Projects</h2>
        <p>Interactive, data-driven work with real-world impact</p>
      </div>

      <!-- Filters -->
      <div class="text-center mb-4">
        <button class="btn btn-outline-info filter-btn" data-filter="all">All</button>
        <button class="btn btn-outline-info filter-btn" data-filter="AI">AI</button>
        <button class="btn btn-outline-info filter-btn" data-filter="ML">ML</button>
        <button class="btn btn-outline-info filter-btn" data-filter="Research">Research</button>
      </div>

      <!-- Projects -->
      <div class="row" id="project-container"></div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    © 2026 Derrick Chilenga — Built with precision
  </footer>

  <!-- JS -->
  <script>
    const projects = [
      {
        title: "Brain Tumor Detection",
        category: "AI",
        image: "assets/img/project1.jpg",
        accuracy: "94%",
        description: "Deep learning + tensor methods",
        github: "https://github.com/",
        demo: "#"
      },
      {
        title: "Bank Customer Churn",
        category: "ML",
        image: "assets/img/project2.jpg",
        accuracy: "86%",
        description: "Predictive modeling system",
        github: "https://github.com/",
        demo: "https://iiip-capstone-project-el9hcnbsrywxzy9nqezu5p.streamlit.app/"
      },
      {
        title: "Geophysical Inversion",
        category: "Research",
        image: "assets/img/project3.jpg",
        accuracy: "High Precision",
        description: "Gaussian Processes for inversion",
        github: "https://github.com/",
        demo: "#"
      }
    ];

    const container = document.getElementById("project-container");

    function renderProjects(filter = "all") {
      container.innerHTML = "";

      const filtered = filter === "all"
        ? projects
        : projects.filter(p => p.category === filter);

      filtered.forEach(project => {
        container.innerHTML += `
          <div class="col-lg-4 col-md-6 mb-4">
            <div class="project-card shadow">

              <img src="${project.image}" class="img-fluid">

              <div class="p-3">
                <h5>${project.title}</h5>
                <p>${project.description}</p>

                <small class="text-info">Accuracy: ${project.accuracy}</small>

                <div class="mt-3 d-flex gap-2">
                  <a href="${project.github}" target="_blank" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-github"></i>
                  </a>
                  <a href="${project.demo}" target="_blank" class="btn btn-sm btn-info">
                    Live Demo
                  </a>
                </div>

              </div>
            </div>
          </div>
        `;
      });
    }

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        renderProjects(btn.dataset.filter);
      });
    });

    renderProjects();
  </script>

</body>

</html>
