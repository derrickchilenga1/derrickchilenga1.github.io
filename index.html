<!-- CONTACT SECTION -->
<section id="contact" style="position: relative; height: 100vh; overflow: hidden;">
  <!-- Background video -->
  <video autoplay muted loop playsinline style="
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        top: 0;
        left: 0;
        z-index: 1;
        opacity: 0.25;">
    <source src="assets/video/MC.mp4" type="video/mp4">
  </video>

  <!-- Overlay content -->
  <div class="container h-100 d-flex flex-column justify-content-center align-items-center text-center" style="position: relative; z-index: 2;">
    <h2 class="mb-4" style="color: #fff;" data-aos="fade-up">Contact Me</h2>

    <!-- Contact Details -->
    <div class="mb-5" data-aos="fade-up" data-aos-delay="100">
      <p style="color: #fff; font-size: 1.1rem;">
        <i class="bi bi-envelope-fill"></i> <a href="mailto:derrickchilenga1@gmail.com" style="color: #38bdf8;">derrickchilenga1@gmail.com</a><br>
        <i class="bi bi-telephone-fill"></i> <a href="tel:+260963768567" style="color: #38bdf8;">+260 963 768 567</a><br>
        <i class="bi bi-whatsapp"></i> <a href="https://wa.me/260963768567" target="_blank" style="color: #38bdf8;">Chat on WhatsApp</a>
      </p>
    </div>

    <!-- Contact Form -->
    <form id="contact-form" class="w-100" style="max-width: 500px;" data-aos="fade-up" data-aos-delay="200">
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Your Name" name="name" required>
      </div>
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Your Email" name="email" required>
      </div>
      <div class="mb-3">
        <textarea class="form-control" rows="5" placeholder="Your Message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">Send Message</button>
    </form>

    <p class="mt-3" style="color: #fff; font-size: 0.9rem;">I will get back to you as soon as possible!</p>
  </div>
</section>

<!-- JS for form submission (optional placeholder) -->
<script>
document.getElementById('contact-form').addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Thanks for your message! I will get back to you shortly.');
  this.reset();
});
</script>
